name: Build and Deploy Angular Website to Host Africa

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production website
        run: npm run build -- --configuration production --base-href /

      - name: Deploy built website to Host Africa via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOSTAFRICA_FTP_SERVER }}
          username: ${{ secrets.HOSTAFRICA_FTP_USERNAME }}
          password: ${{ secrets.HOSTAFRICA_FTP_PASSWORD }}
          port: ${{ secrets.HOSTAFRICA_FTP_PORT }}
          protocol: ftp
          timeout: 120000
          log-level: verbose
          local-dir: ./dist/my-app/browser/
          server-dir: domains/njcfirecontrol.co.za/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/cgi-bin/**
